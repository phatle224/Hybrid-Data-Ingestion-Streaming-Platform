services:
  profiling_consumer:
    container_name: cdc_profiling
    build:
      context: ./services
      dockerfile: profiling/Dockerfile
    environment:
      # Kafka Configuration
      KAFKA_BOOTSTRAP_SERVERS: kafka:9093
      CONSUMER_GROUP: profiling-consumer-v1
      TOPIC_PREFIX: staging.affina_staging
      
      # Staging Database (read-only for lookups)
      STAGING_DB_HOST: 172.16.10.32
      STAGING_DB_USER: aff_admin
      STAGING_DB_PASSWORD: affina_poOB7G9A51
      
      # Reporting Database (write profiling_analysis)
      REPORTING_DB_HOST: 172.16.10.32
      REPORTING_DB_USER: aff_admin
      REPORTING_DB_PASSWORD: affina_poOB7G9A51
      
      # Logging
      PYTHONUNBUFFERED: 1
      LOG_LEVEL: INFO
    
    volumes:
      - ./logs:/app/logs
    
    networks:
      - cdc-network
    
    restart: always
    
    # Health check
    healthcheck:
      test: ["CMD", "python", "-c", "import sys; sys.exit(0)"]
      interval: 30s
      timeout: 10s
      retries: 3

networks:
  cdc-network:
    external: true
