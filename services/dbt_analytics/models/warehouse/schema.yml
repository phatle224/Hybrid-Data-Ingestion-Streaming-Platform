version: 2

models:
  # ============================================================================
  # WAREHOUSE — Dimensions
  # ============================================================================
  - name: dim_date
    description: "Date dimension — static, generating calendar series from 2020 to 2030."
    columns:
      - name: date_key
        description: "Surrogate date key in YYYYMMDD format."
        tests:
          - unique
          - not_null
      - name: full_date
        tests:
          - unique
          - not_null

  - name: dim_customer
    description: "Customer dimension containing demographics of the insurance buyer."
    columns:
      - name: customer_key
        description: "Surrogate customer key computed as MD5(name, dob, phone)."
        tests:
          - unique
          - not_null
      - name: buyer_name
        tests:
          - not_null
      - name: buyer_age_group
        tests:
          - accepted_values:
              values: ['0-17', '18-35', '36-55', '56+', 'Unknown']

  - name: dim_insured_person
    description: "Insured person dimension — decodes city name, relationship, and age group details."
    columns:
      - name: insured_person_key
        description: "Surrogate insured key computed as MD5(name, dob, phone)."
        tests:
          - unique
          - not_null
      - name: insured_name
        tests:
          - not_null
      - name: insured_age_group
        tests:
          - accepted_values:
              values: ['0-6', '7-17', '18-35', '36-55', '56+', 'Unknown']

  - name: dim_product
    description: "Product dimension containing details about insurance type, program, and provider."
    columns:
      - name: product_key
        description: "Surrogate product key computed as MD5(type, major, program, provider)."
        tests:
          - unique
          - not_null
      - name: insurance_type
        tests:
          - not_null

  - name: dim_sales_channel
    description: "Sales channel dimension — maps company sale names and branches."
    columns:
      - name: channel_key
        description: "Surrogate sales channel key computed as MD5(company, branch)."
        tests:
          - unique
          - not_null

  # ============================================================================
  # WAREHOUSE — Facts
  # ============================================================================
  - name: fct_contracts
    description: "Insurance contracts fact table — grain: 1 contract object."
    columns:
      - name: contract_object_id
        description: "Natural key of the contract object."
        tests:
          - unique
          - not_null
      - name: customer_key
        tests:
          - relationships:
              to: ref('dim_customer')
              field: customer_key
              severity: warn
      - name: insured_person_key
        tests:
          - relationships:
              to: ref('dim_insured_person')
              field: insured_person_key
              severity: warn
      - name: product_key
        tests:
          - relationships:
              to: ref('dim_product')
              field: product_key
              severity: warn
      - name: fee_insurance
        description: "Insurance premium fee (VND)."
      - name: source_type
        tests:
          - accepted_values:
              values: ['online', 'offline']

  - name: fct_claims
    description: "Insurance claims fact table — grain: 1 claim record."
    columns:
      - name: claim_id
        description: "Natural key of the claim."
        tests:
          - unique
          - not_null
      - name: contract_object_id
        tests:
          - not_null
          - relationships:
              to: ref('fct_contracts')
              field: contract_object_id
              severity: warn
      - name: amount_claim
        description: "Claimed compensation amount requested by the client."
      - name: compensation_amount
        description: "Approved compensation amount paid out."
      - name: compensation_rate
        description: "Ratio of approved compensation to claimed amount (%)."

  # ============================================================================
  # MART — Data Marts
  # ============================================================================
  - name: dm_profiling_analysis
    description: "Data Mart for profiling claims analysis — joins fct_claims with Dimensions."
    columns:
      - name: claim_id
        tests:
          - unique
          - not_null

  - name: dm_contract_summary
    description: "Data Mart summarizing contract data by product, channel, and geographic region."
    columns:
      - name: contract_object_id
        tests:
          - unique
          - not_null
