# ============================================================================
# Docker Compose for Debezium Connect
# Includes: Debezium Kafka Connect
# Usage: docker-compose -f docker-compose.debezium.yml up -d
# Note: Requires Kafka infrastructure to be running first
# ============================================================================

services:
  connect:
    image: debezium/connect:2.6.1.Final
    container_name: cdc_debezium
    restart: always
    ports:
      - "8083:8083"
    environment:
      - BOOTSTRAP_SERVERS=kafka:9093
      - GROUP_ID=1
      - CONFIG_STORAGE_TOPIC=my_connect_configs
      - OFFSET_STORAGE_TOPIC=my_connect_offsets
      - STATUS_STORAGE_TOPIC=my_connect_statuses
      - CONNECT_REST_ADVERTISED_HOST_NAME=connect
      - CONNECT_LOG4J_LOGGERS=org.reflections=ERROR
    volumes:
      - ./debezium_data:/debezium/data
  debezium-ui:
    image: debezium/debezium-ui:2.4
    container_name: cdc_debezium_ui
    restart: always
    depends_on:
      - connect
    ports:
      - "8084:8080"
    environment:
      KAFKA_CONNECT_URIS: http://cdc_debezium:8083

networks:
  default:
    name: cdc-network
    external: true
